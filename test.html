<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WS Notification Test</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f12;
            --surface: #151820;
            --surface2: #1c2030;
            --border: #2a2f42;
            --border2: #353c55;
            --text: #e2e6f0;
            --muted: #6b748a;
            --accent: #4f8ef7;
            --accent-dim: #1a2a4a;
            --green: #3dd68c;
            --green-dim: #0f2e1e;
            --red: #f75f5f;
            --red-dim: #2e1212;
            --yellow: #f7c04f;
            --yellow-dim: #2e2212;
            --font: 'IBM Plex Sans', monospace;
            --mono: 'IBM Plex Mono', monospace;
            --radius: 6px;
            --radius-lg: 10px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ─── Toast ─── */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--surface2);
            font-size: 13px;
            color: var(--text);
            pointer-events: all;
            min-width: 220px;
            max-width: 300px;
            animation: toastIn 0.2s ease forwards;
            font-family: var(--mono);
        }

        .toast.out {
            animation: toastOut 0.25s ease forwards;
        }

        .toast-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .toast.success .toast-dot {
            background: var(--green);
        }

        .toast.error .toast-dot {
            background: var(--red);
        }

        .toast.info .toast-dot {
            background: var(--accent);
        }

        .toast.warn .toast-dot {
            background: var(--yellow);
        }

        .toast-msg {
            flex: 1;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
            transition: color 0.15s;
        }

        .toast-close:hover {
            color: var(--text);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(14px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(14px);
            }
        }

        /* ─── Layout ─── */
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .header-left h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 2px;
        }

        .header-left p {
            font-size: 13px;
            color: var(--muted);
            font-family: var(--mono);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 12px;
            border-radius: 99px;
            border: 1px solid var(--border);
            font-size: 12px;
            font-family: var(--mono);
            color: var(--muted);
            background: var(--surface);
            white-space: nowrap;
            transition: border-color 0.3s, color 0.3s;
        }

        .status-badge.connected {
            border-color: #1e4a30;
            color: var(--green);
        }

        .status-badge.disconnected {
            border-color: #3a1616;
            color: var(--red);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .status-dot.pulse {
            animation: pulse 1.8s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        /* ─── Stats ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.85rem 1rem;
        }

        .stat-label {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 500;
            font-family: var(--mono);
            color: var(--text);
        }

        /* ─── Log panel ─── */
        .log-panel {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--surface);
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .log-header-title {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 12px;
            font-family: var(--mono);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }

        .btn-clear:hover {
            background: var(--border);
            color: var(--text);
        }

        #messages {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.5;
            animation: entryIn 0.15s ease;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        @keyframes entryIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-entry .ts {
            color: var(--muted);
            flex-shrink: 0;
            padding-top: 1px;
            min-width: 72px;
        }

        .log-entry .payload {
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .log-entry .tag {
            flex-shrink: 0;
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 3px;
            margin-top: 2px;
        }

        .tag-notification {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tag-connect {
            background: var(--green-dim);
            color: var(--green);
        }

        .tag-disconnect {
            background: var(--red-dim);
            color: var(--red);
        }

        .tag-system {
            background: var(--yellow-dim);
            color: var(--yellow);
        }

        #empty-state {
            padding: 2.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            font-family: var(--mono);
        }

        #empty-state svg {
            display: block;
            margin: 0 auto 10px;
            opacity: 0.3;
        }

        /* ─── Actions ─── */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            font-family: var(--mono);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn svg {
            flex-shrink: 0;
        }

        /* ─── Footer ─── */
        .footer {
            margin-top: 2rem;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div id="toast-container"></div>

    <div class="page">
        <div class="header">
            <div class="header-left">
                <h1>Notification monitor</h1>
                <p id="endpoint-label">ws://13.211.170.40:3000/notifications</p>
            </div>
            <div id="status-badge" class="status-badge disconnected">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">User ID</div>
                <div class="stat-value" id="stat-uid">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Received</div>
                <div class="stat-value" id="stat-count">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Last event</div>
                <div class="stat-value" id="stat-last">—</div>
            </div>
        </div>

        <div class="log-panel">
            <div class="log-header">
                <span class="log-header-title">Event log</span>
                <button class="btn-clear" onclick="clearLog()">clear</button>
            </div>
            <ul id="messages"></ul>
            <div id="empty-state">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="14" rx="2" />
                    <path d="M3 9h18" />
                </svg>
                Waiting for events…
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="simulateNotification()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                Simulate event
            </button>
            <button class="btn" onclick="doReconnect()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6" />
                    <path d="M1 20v-6h6" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
                Reconnect
            </button>
        </div>

        <div class="footer">socket.io 4.7.5 &nbsp;·&nbsp; <span id="footer-uid"></span></div>
    </div>

    <script>
        let msgCount = 0;
        let socket = null;
        let currentUserId = '';

        // ── Toast ──────────────────────────────────────────────────────────────
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span class="toast-dot"></span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="dismissToast(this.parentElement)">✕</button>`;
            container.appendChild(t);
            setTimeout(() => dismissToast(t), 4200);
        }

        function dismissToast(el) {
            if (!el || !el.parentElement) return;
            el.classList.add('out');
            setTimeout(() => el.remove(), 280);
        }

        // ── Status ─────────────────────────────────────────────────────────────
        function setStatus(connected, uid) {
            const badge = document.getElementById('status-badge');
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            badge.className = 'status-badge ' + (connected ? 'connected' : 'disconnected');
            dot.className = 'status-dot' + (connected ? ' pulse' : '');
            txt.textContent = connected ? `connected` : 'disconnected';
            if (uid) {
                document.getElementById('stat-uid').textContent = uid;
                document.getElementById('footer-uid').textContent = 'user: ' + uid;
            }
        }

        // ── Log ────────────────────────────────────────────────────────────────
        function addEntry(payload, type = 'notification') {
            msgCount++;
            document.getElementById('stat-count').textContent = msgCount;
            const now = new Date();
            document.getElementById('stat-last').textContent =
                now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('empty-state').style.display = 'none';

            const ul = document.getElementById('messages');
            const li = document.createElement('li');
            li.className = 'log-entry';

            const tagClass = {
                notification: 'tag-notification',
                connect: 'tag-connect',
                disconnect: 'tag-disconnect',
                system: 'tag-system'
            }[type] || 'tag-system';

            li.innerHTML = `
      <span class="ts">${now.toLocaleTimeString('en-US', { hour12: false })}</span>
      <span class="tag ${tagClass}">${type}</span>
      <span class="payload">${typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2)}</span>
    `;
            ul.appendChild(li);
            ul.scrollTop = ul.scrollHeight;
        }

        function clearLog() {
            document.getElementById('messages').innerHTML = '';
            document.getElementById('empty-state').style.display = 'block';
            msgCount = 0;
            document.getElementById('stat-count').textContent = '0';
            document.getElementById('stat-last').textContent = '—';
        }

        // ── Simulate ───────────────────────────────────────────────────────────
        function simulateNotification() {
            const sample = {
                type: 'alert',
                message: 'New order received',
                id: Math.random().toString(36).slice(2, 9),
                ts: Date.now()
            };
            addEntry(sample, 'notification');
            showToast('notification received', 'info');
        }

        function doReconnect() {
            if (socket) {
                socket.disconnect();
                socket.connect();
            }
            showToast('reconnecting…', 'warn');
        }

        // ── Socket ─────────────────────────────────────────────────────────────
        function initSocket(userId) {
            socket = io('http://13.211.170.40:3000/notifications', {
                query: { userId }
            });

            socket.on('connect', () => {
                setStatus(true, userId);
                addEntry(`connected as ${userId}`, 'connect');
                showToast(`connected as ${userId}`, 'success');
            });

            socket.on('notification', (data) => {
                addEntry(data, 'notification');
                showToast('notification received', 'info');
            });

            socket.on('disconnect', (reason) => {
                setStatus(false);
                addEntry(`disconnected — ${reason}`, 'disconnect');
                showToast('disconnected', 'error');
            });

            socket.on('connect_error', (err) => {
                setStatus(false);
                addEntry(`connection error — ${err.message}`, 'system');
                showToast('connection failed', 'error');
            });
        }

        // ── Init ───────────────────────────────────────────────────────────────
        currentUserId = prompt('Enter User ID to listen for:', 'user-123') || 'user-123';
        initSocket(currentUserId);
    </script>
</body>

</html>
