name: Deploy NestJS to EC2

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node in CI runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install deps (clean install from lock file)
      - name: Install dependencies
        run: npm ci

      # 4. Compile TypeScript → dist/
      - name: Build
        run: npm run build

      # 5. Run tests before deploying
      - name: Run tests
        run: npm run test --if-present


  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:

      # 1. Pull source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 6. SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_DIR }}
            git pull origin main
            npm install
            rm -rf dist
            npm run build
            pm2 restart notification-engine \
              || pm2 start dist/main.js \
              --name notification-engine
            pm2 save